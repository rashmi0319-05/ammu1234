<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<style>
body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #ffe6f0;
    font-family: "Comic Sans MS", cursive;
}

/* ✅ Smaller & responsive box */
#slideshow {
    position: relative;
    width: 80vw;
    height: 60vh;
    max-width: 700px;
    max-height: 450px;
    background: black;
    overflow: hidden;
    border-radius: 15px;
}

/* Images */
#slideshow img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

#slideshow img.active {
    opacity: 1;
}

/* Message */
#message {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    font-size: 28px;
    color: pink;
    text-shadow: 2px 2px 6px black;
    z-index: 10;
}

/* 💖 Hearts */
.heart {
    position: absolute;
    animation: float 3s linear infinite;
}

@keyframes float {
    0% {
        transform: translateY(100vh);
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div id="slideshow">
    <div id="message">Loading...</div>
</div>

<!-- 🎵 Music -->
<audio id="bgm" controls>
    <source src="music/birthday.mp3.mp3" type="audio/mpeg">
</audio>

<script>
const photos = [
  "photosp1.jpg","photosp2.jpg","photosp3.jpg","photosp4.jpg","photosp5.jpg",
  "photosp6.jpg","photosp7.jpg","photosp8.jpg","photosp9.jpg","photosp10.jpg",
  "photosp11.jpg","photosp12.jpg","photosp13.jpg","photosp14.jpg","photosp15.jpg"
];

const messages = [
  "🎉 Happy Birthday 🎉",
  "💖 You are very special 💖",
  "😊 So many sweet memories 😊",
  "🌟 Keep shining always 🌟",
  "🎂 Enjoy your beautiful day 🎂",
  "💫 Dreams come true 💫",
  "🎁 Smiles and happiness 🎁",
  "❤️ Stay cute forever ❤️",
  "🌈 Life is brighter with you 🌈",
  "🥳 Celebrate big today 🥳",
  "🎊 Cheers to memories 🎊",
  "💕 Forever thankful 💕",
  "You're my happiness",
  "Love you so much",
  "CHINNAMAAAA ❤️"
];

const slideshow = document.getElementById("slideshow");
const messageDiv = document.getElementById("message");
const audio = document.getElementById("bgm");

let index = 0;
const imgs = [];

/* Load images */
photos.forEach(name => {
    const img = document.createElement("img");
    img.src = "photos/" + name;
    slideshow.appendChild(img);
    imgs.push(img);
});

/* Slideshow */
function showSlide() {
    imgs.forEach(img => img.classList.remove("active"));
    imgs[index].classList.add("active");
    messageDiv.textContent = messages[index % messages.length];
    index = (index + 1) % imgs.length;
}

/* ⚡ Faster slideshow */
window.onload = () => {
    showSlide();
    setInterval(showSlide, 2500);
};

/* 🎵 Play music on click */
document.body.addEventListener("click", () => {
    audio.play();
}, { once: true });

/* 💖 Hearts */
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");

    const hearts = ["💖","💗","💘","❤️","💕"];
    heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 30 + 10) + "px";

    const duration = Math.random() * 2 + 2;
    heart.style.animationDuration = duration + "s";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), duration * 1000);
}

/* 💖 More hearts */
setInterval(() => {
    for(let i = 0; i < 3; i++) {
        createHeart();
    }
}, 120);
</script>

</body>
</html>
